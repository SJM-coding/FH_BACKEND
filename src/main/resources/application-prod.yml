# application-prod.yml (프로드 환경)
# ⚠️ 실제 값은 환경변수로 주입받아야 합니다
spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${S3_BUCKET}

app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-ms: ${JWT_ACCESS_MS:3600000}
    refresh-token-validity-ms: ${JWT_REFRESH_MS:604800000}
    access-cookie-name: ${JWT_ACCESS_COOKIE_NAME:accessToken}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-domain: ${JWT_COOKIE_DOMAIN:}
    cookie-path: /
    cookie-secure: true
    cookie-same-site: ${JWT_COOKIE_SAMESITE:Lax}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI}

server:
  port: 8080
  forward-headers-strategy: framework
