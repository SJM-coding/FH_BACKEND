# application-local.yml (로컬 개발 환경)
# - 개인 로컬 개발 편의용 프로필
# - Flyway 대신 Hibernate가 현재 엔티티 기준으로 스키마를 맞춘다
# - Docker MySQL / Redis 기본값을 두되, 환경변수로 쉽게 덮어쓸 수 있게 한다
spring:
  cache:
    type: ${LOCAL_CACHE_TYPE:redis}
  datasource:
    url: ${LOCAL_DB_URL:jdbc:mysql://localhost:3306/futsal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${LOCAL_DB_USERNAME:futsal}
    password: ${LOCAL_DB_PASSWORD:futsal}
  data:
    redis:
      host: ${LOCAL_REDIS_HOST:localhost}
      port: ${LOCAL_REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  jpa:
    hibernate:
      ddl-auto: ${LOCAL_DDL_AUTO:create}
    show-sql: ${LOCAL_SHOW_SQL:true}

  flyway:
    enabled: ${LOCAL_FLYWAY_ENABLED:false}

aws:
  region: ap-northeast-2
  s3:
    bucket: futsal-ai-sjm

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
  jwt:
    secret: your-secret-key-minimum-256-bits-long-for-HS256-algorithm-please-change-this-in-production
    access-token-validity-ms: 3600000  # 1시간
    refresh-token-validity-ms: 604800000  # 7일
    access-cookie-name: accessToken
    refresh-cookie-name: refreshToken
    cookie-path: /
    cookie-secure: false
    cookie-same-site: Lax
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/callback
