# application-local.yml (로컬 개발 환경)
spring:
  datasource:
    url: jdbc:h2:mem:futsaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

aws:
  region: ap-northeast-2
  s3:
    bucket: futsal-ai-sjm

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
  jwt:
    secret: your-secret-key-minimum-256-bits-long-for-HS256-algorithm-please-change-this-in-production
    access-token-validity-ms: 3600000  # 1시간
    refresh-token-validity-ms: 604800000  # 7일
    access-cookie-name: accessToken
    refresh-cookie-name: refreshToken
    cookie-path: /
    cookie-secure: false
    cookie-same-site: Lax
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/callback
